# 26 Massachusetts Gateway Cities
# Source: MassHousing Gateway Cities designation
# Place FIPS verified against Census ACS 5-year 2022 API (acs/acs5, place:*, in state:25)
# County FIPS from Census TIGER/ANSI codes
# All place_fips are 5-digit; county_fips are 3-digit within MA (state_fips: "25")
#
# tract_codes: 6-digit Census API "tract" column values for tracts inside city limits.
# Populate this list to enable sub-city tract/block-group filtering.
# Lawrence's codes are verified via Census Geocoder (2022 vintage).
# For other cities, run:
#   python main.py --list-census-tables   # to verify API connectivity
# Then query the Census Geocoder or Tiger/Line files to find tract codes,
# or use the Census API: for=tract:*&in=state:25+county:XXX and filter by NAME.
# Leave as [] to receive all county tracts (with a warning).

